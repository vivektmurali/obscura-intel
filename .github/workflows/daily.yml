name: daily-pipeline
on:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/10_daily_ingest.py
      - run: python scripts/11_daily_events.py
      - run: python scripts/06_scoring.py
      - run: |
          git config user.name "obscura-bot"
          git config user.email "obscura-bot@users.noreply.github.com"
          git add data/live/ data/live_events.csv
          git commit -m "data: $(date -u +%F) daily ingest" || echo "no changes"
          git push
